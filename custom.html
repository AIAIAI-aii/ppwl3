<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Tabs</title>
    <link rel="stylesheet" href="output.css">

    <style type="text/tailwindcss">
    @layer components {

        .tabs-container {
        @apply w-full max-w-md;}

        .tabs-wrapper {
        @apply flex border-b border-gray-300;}

        .tab-item {
        @apply px-4 py-2 text-sm font-medium border-b-2 transition;}

        .tab-active {
        @apply border-purple-600 text-purple-600;}

        .tab-inactive {
        @apply border-transparent text-gray-500 hover:text-purple-600 hover:border-purple-400;}

    }
    </style>
</head>
<body class="p-10">

<div class="tabs-container">
    <div class="tabs-wrapper">
    <!-- Active -->
    <button class="tab-item tab-active">Tab 1</button>
    <!-- Inactive -->
    <button class="tab-item tab-inactive">Tab 2</button>
    <button class="tab-item tab-inactive">Tab 3</button>
    </div>
</div>

</body>
</html>
